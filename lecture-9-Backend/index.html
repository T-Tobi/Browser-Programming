<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Backend API test interface for Browser Programming lab"
    />
    <title>Backend API Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="wrapper">
      <header role="banner">
        <p class="tag" aria-label="Server address">localhost:3000</p>
        <h1>Backend <span class="accent">API</span> Test</h1>
        <p class="subtitle">Browser Programming &mdash; Spring 2026</p>
      </header>

      <main>
        <!-- Student endpoint section -->
        <section aria-labelledby="student-heading">
          <div class="card">
            <header class="card-header">
              <h2 id="student-heading" class="card-title">Student Endpoint</h2>
              <span class="endpoint" aria-label="Endpoint route"
                >GET /api/student</span
              >
            </header>

            <button
              type="button"
              class="btn"
              onclick="getStudent()"
              aria-controls="student-output"
              aria-label="Fetch student data from backend"
            >
              <svg
                class="icon"
                viewBox="0 0 24 24"
                aria-hidden="true"
                focusable="false"
              >
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
              Fetch Student
            </button>

            <output
              id="student-output"
              class="output"
              aria-live="polite"
              aria-atomic="true"
            ></output>
          </div>
        </section>

        <!-- Message endpoint section -->
        <section aria-labelledby="message-heading">
          <div class="card">
            <header class="card-header">
              <h2 id="message-heading" class="card-title">Message Endpoint</h2>
              <span class="endpoint" aria-label="Endpoint route"
                >GET /api/message</span
              >
            </header>

            <button
              type="button"
              class="btn"
              onclick="getMessage()"
              aria-controls="message-output"
              aria-label="Fetch message from backend"
            >
              <svg
                class="icon"
                viewBox="0 0 24 24"
                aria-hidden="true"
                focusable="false"
              >
                <path
                  d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
                />
              </svg>
              Fetch Message
            </button>

            <output
              id="message-output"
              class="output"
              aria-live="polite"
              aria-atomic="true"
            ></output>
          </div>
        </section>
      </main>

      <footer role="contentinfo">
        <small>node.js + express &nbsp;&middot;&nbsp; cors enabled</small>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
