<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Weather Dashboard</h1>

    <nav>
        <a href="Index.html">Back to Portfolio</a> |
        <a href="weather.html">Weather App</a>
    </nav>

    <p>This page loads current weather data from a public API.</p>

    <div class="button-group">
        <button id="btnKuopio">Kuopio</button>
        <button id="btnHelsinki">Helsinki</button>
        <button id="btnOulu">Oulu</button>
    </div>

    <div id="weatherBox" class="weather-box">
        <p><strong>City:</strong> <span id="city">-</span></p>
        <p><strong>Temperature:</strong> <span id="temperature">-</span></p>
        <p><strong>Wind Speed:</strong> <span id="wind">-</span></p>
        <p><strong>Time:</strong> <span id="time">-</span></p>
    </div>

    <pre id="output"></pre>

    <script src="weather-dashboard.js"></script>
</body>
</html>
